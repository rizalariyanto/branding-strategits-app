<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastermind ID - AI Branding Strategist</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bg-mastermind { background: linear-gradient(135deg, #9333ea 0%, #ec4899 50%, #fb923c 100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons Component Helper
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        // API Key Konfigurasi
        const apiKey = "AIzaSyASyQRpc01YUmVmizJteudszjhb63-ANfU"; 

        const App = () => {
            const [isGenerated, setIsGenerated] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [activeTab, setActiveTab] = useState('positioning');
            const [copyStatus, setCopyStatus] = useState(null);
            const [error, setError] = useState(null);
            const [selectedPillar, setSelectedPillar] = useState(null);

            const [formData, setFormData] = useState({
                brandName: 'Mastermind ID',
                niche: '',
                targetAudience: '',
                platform: '',
                goal: 'authority',
                persona: 'intelektual',
                uniqueValue: '',
                problemSolved: '',
                credibility: '',
                limitations: ''
            });

            const [strategyData, setStrategyData] = useState(null);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const generateStrategy = async () => {
                if (!apiKey || apiKey.includes("your_key")) {
                    setError("API Key belum valid. Pastikan Anda telah memasukkan kunci yang benar.");
                    return;
                }

                setIsLoading(true);
                setError(null);

                const systemPrompt = `Anda adalah Strategist Personal Branding & Content Growth Expert. 
                Tugas Anda adalah membuat strategi lengkap dalam format JSON berdasarkan input user.
                Output HARUS berupa JSON murni dengan struktur:
                {
                    "positioning": { "tagline": "string", "persona": "string", "xFactor": "string", "attributes": ["string"] },
                    "pillars": [{ 
                        "id": number, 
                        "title": "string", 
                        "icon": "emoji", 
                        "desc": "string", 
                        "strategyDetails": "string (Tips detail 2-3 kalimat cara eksekusi pillar ini secara visual dan tulisan)" 
                    }],
                    "hooks": ["string (total 20)"],
                    "captions": { "short": "string", "long": "string" },
                    "growth": [{ "day": "string", "focus": "string", "task": "string" }]
                }
                Gunakan Bahasa Indonesia yang natural, tajam, dan profesional.`;

                const userQuery = `Buatkan strategi branding untuk:
                Nama: ${formData.brandName}
                Niche: ${formData.niche}
                Target Audiens: ${formData.targetAudience}
                Platform: ${formData.platform}
                Tujuan: ${formData.goal}
                Persona: ${formData.persona}
                Nilai Unik: ${formData.uniqueValue || "Berikan nilai unik standar industri"}
                Masalah yang diselesaikan: ${formData.problemSolved}
                Kredibilitas: ${formData.credibility || "Ekspertise di bidangnya"}
                Batasan: ${formData.limitations || "Tidak ada batasan spesifik"}`;

                const callApiWithRetry = async (attempt = 0) => {
                    const delays = [1000, 2000, 4000, 8000, 16000];
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userQuery }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });

                        if (!response.ok) {
                            if (attempt < 5) {
                                await new Promise(res => setTimeout(res, delays[attempt]));
                                return callApiWithRetry(attempt + 1);
                            }
                            throw new Error('Gagal terhubung ke API Gemini.');
                        }

                        const result = await response.json();
                        const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (!text) throw new Error('Format respon AI tidak valid.');

                        const parsedData = JSON.parse(text);
                        setStrategyData(parsedData);
                        setIsGenerated(true);
                        setIsLoading(false);
                    } catch (err) {
                        if (attempt < 5) {
                            await new Promise(res => setTimeout(res, delays[attempt]));
                            return callApiWithRetry(attempt + 1);
                        }
                        setError("Maaf, terjadi gangguan pada server AI. Silakan coba lagi nanti.");
                        setIsLoading(false);
                    }
                };

                callApiWithRetry();
            };

            const handleCopy = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopyStatus(text);
                setTimeout(() => setCopyStatus(null), 2000);
            };

            if (!isGenerated) {
                return (
                    <div className="min-h-screen bg-mastermind p-4 md:p-12 animate-fade-in flex items-center justify-center">
                        <div className="max-w-4xl w-full mx-auto">
                            <div className="text-center mb-10">
                                <h1 className="text-6xl font-black tracking-tight mb-4 uppercase text-white drop-shadow-lg">Mastermind ID</h1>
                                <p className="text-white/90 text-lg font-medium">Hasilkan strategi konten kustom bertenaga AI dengan cetak biru profesional.</p>
                            </div>

                            <div className="bg-white rounded-[2.5rem] shadow-2xl border border-white/20 overflow-hidden">
                                <div className="p-8 md:p-12 space-y-6">
                                    <div className="grid md:grid-cols-2 gap-6">
                                        <div className="space-y-4">
                                            <label className="block">
                                                <span className="text-sm font-bold text-slate-700 ml-1">Nama/Brand</span>
                                                <input name="brandName" value={formData.brandName} onChange={handleInputChange} className="mt-1 block w-full px-4 py-3 bg-slate-50 border-slate-200 border rounded-2xl focus:bg-white focus:ring-2 focus:ring-purple-500 transition-all outline-none" placeholder="Mastermind ID" />
                                            </label>
                                            <label className="block">
                                                <span className="text-sm font-bold text-slate-700 ml-1">Niche Utama</span>
                                                <input name="niche" value={formData.niche} onChange={handleInputChange} className="mt-1 block w-full px-4 py-3 bg-slate-50 border-slate-200 border rounded-2xl focus:bg-white focus:ring-2 focus:ring-purple-500 transition-all outline-none" placeholder="Misal: Digital Marketer" />
                                            </label>
                                            <label className="block">
                                                <span className="text-sm font-bold text-slate-700 ml-1">Target Audiens</span>
                                                <input name="targetAudience" value={formData.targetAudience} onChange={handleInputChange} className="mt-1 block w-full px-4 py-3 bg-slate-50 border-slate-200 border rounded-2xl focus:bg-white focus:ring-2 focus:ring-purple-500 transition-all outline-none" placeholder="Misal: Pelaku UMKM" />
                                            </label>
                                        </div>

                                        <div className="space-y-4">
                                            <div className="grid grid-cols-2 gap-4">
                                                <label className="block">
                                                    <span className="text-sm font-bold text-slate-700 ml-1">Tujuan</span>
                                                    <select name="goal" value={formData.goal} onChange={handleInputChange} className="mt-1 block w-full px-4 py-3 bg-slate-50 border-slate-200 border rounded-2xl focus:bg-white focus:ring-2 focus:ring-purple-500 transition-all outline-none">
                                                        {['popularitas', 'followers', 'engagement', 'leads', 'penjualan', 'authority'].map(g => <option key={g} value={g}>{g}</option>)}
                                                    </select>
                                                </label>
                                                <label className="block">
                                                    <span className="text-sm font-bold text-slate-700 ml-1">Persona</span>
                                                    <select name="persona" value={formData.persona} onChange={handleInputChange} className="mt-1 block w-full px-4 py-3 bg-slate-50 border-slate-200 border rounded-2xl focus:bg-white focus:ring-2 focus:ring-purple-500 transition-all outline-none">
                                                        {['tegas', 'santai', 'lucu', 'elegan', 'intelektual', 'religius', 'edgy', 'inspiring'].map(p => <option key={p} value={p}>{p}</option>)}
                                                    </select>
                                                </label>
                                            </div>
                                            <label className="block">
                                                <span className="text-sm font-bold text-slate-700 ml-1">Masalah Audiens</span>
                                                <input name="problemSolved" value={formData.problemSolved} onChange={handleInputChange} className="mt-1 block w-full px-4 py-3 bg-slate-50 border-slate-200 border rounded-2xl focus:bg-white focus:ring-2 focus:ring-purple-500 transition-all outline-none" placeholder="Apa kesulitan utama mereka?" />
                                            </label>
                                            <label className="block">
                                                <span className="text-sm font-bold text-slate-700 ml-1">Platform</span>
                                                <input name="platform" value={formData.platform} onChange={handleInputChange} className="mt-1 block w-full px-4 py-3 bg-slate-50 border-slate-200 border rounded-2xl focus:bg-white focus:ring-2 focus:ring-purple-500 transition-all outline-none" placeholder="Instagram, TikTok, LinkedIn" />
                                            </label>
                                        </div>
                                    </div>

                                    <button 
                                        onClick={generateStrategy}
                                        disabled={isLoading || !formData.brandName || !formData.niche}
                                        className="w-full py-5 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-2xl font-black text-lg flex items-center justify-center space-x-3 hover:scale-[1.01] active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-xl shadow-purple-200"
                                    >
                                        {isLoading ? (
                                            <Icon name="loader-2" className="animate-spin" />
                                        ) : (
                                            <Icon name="zap" />
                                        )}
                                        <span>{isLoading ? "Merumuskan Strategi..." : "Hasilkan Strategi Mastermind"}</span>
                                    </button>
                                    {error && <p className="text-red-600 text-center font-bold text-sm bg-red-50 p-4 rounded-xl border border-red-200 leading-relaxed">{error}</p>}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row">
                    {/* Sidebar */}
                    <aside className="w-full md:w-64 bg-white border-r border-slate-200 p-6 flex flex-col shrink-0">
                        <div className="flex items-center space-x-2 mb-10 px-2">
                            <div className="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white font-bold italic">M</div>
                            <span className="text-xl font-black tracking-tight truncate">{formData.brandName}</span>
                        </div>
                        
                        <nav className="space-y-1 flex-1">
                            {[
                                { id: 'positioning', icon: 'layout-dashboard', label: 'Positioning' },
                                { id: 'hooks', icon: 'magnet', label: 'Viral Hooks' },
                                { id: 'pillars', icon: 'columns-3', label: 'Content Pillars' },
                                { id: 'captions', icon: 'message-square-text', label: 'Caption Lab' },
                                { id: 'growth', icon: 'trending-up', label: 'Growth Plan' }
                            ].map(tab => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)} 
                                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${activeTab === tab.id ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-100'}`}
                                >
                                    <Icon name={tab.icon} size={20} />
                                    <span className="font-bold">{tab.label}</span>
                                </button>
                            ))}
                        </nav>

                        <button 
                            onClick={() => setIsGenerated(false)}
                            className="mt-6 flex items-center justify-center space-x-2 py-3 border-2 border-slate-200 rounded-xl text-slate-500 font-bold hover:bg-slate-50 transition-colors"
                        >
                            <Icon name="refresh-cw" size={16} />
                            <span>Reset Strategi</span>
                        </button>
                    </aside>

                    {/* Content */}
                    <main className="flex-1 p-6 md:p-10 overflow-y-auto animate-fade-in">
                        <header className="mb-10">
                            <h2 className="text-3xl font-black text-slate-900 tracking-tight uppercase">
                                {activeTab.replace('-', ' ')}
                            </h2>
                            <p className="text-slate-500 font-medium italic">Mastermind Strategy for {formData.brandName}</p>
                        </header>

                        {activeTab === 'positioning' && (
                            <div className="grid lg:grid-cols-2 gap-8">
                                <div className="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm relative overflow-hidden group">
                                    <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:opacity-10 transition-opacity">
                                        <Icon name="target" size={120} />
                                    </div>
                                    <h3 className="text-slate-400 font-black uppercase text-xs tracking-widest mb-4">Tagline Utama</h3>
                                    <p className="text-4xl font-black text-slate-900 mb-8 leading-tight">"{strategyData.positioning.tagline}"</p>
                                    <div className="flex flex-wrap gap-2">
                                        {strategyData.positioning.attributes.map(attr => (
                                            <span key={attr} className="bg-slate-900 text-white px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider">{attr}</span>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-slate-900 text-white p-10 rounded-[2.5rem] shadow-2xl flex flex-col justify-center">
                                    <Icon name="zap" className="text-yellow-400 mb-6" size={40} />
                                    <h3 className="text-yellow-400 font-black uppercase text-xs tracking-widest mb-4">X-Factor & Diferensiasi</h3>
                                    <p className="text-xl text-slate-200 leading-relaxed font-medium">{strategyData.positioning.xFactor}</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'hooks' && (
                            <div className="grid gap-3">
                                {strategyData.hooks.map((hook, i) => (
                                    <div key={i} className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between group hover:border-slate-900 transition-all">
                                        <div className="flex items-center space-x-4">
                                            <span className="w-8 h-8 flex items-center justify-center bg-slate-50 text-slate-400 rounded-lg font-black group-hover:bg-slate-900 group-hover:text-white transition-colors">{i+1}</span>
                                            <p className="text-slate-800 font-bold text-lg">{hook}</p>
                                        </div>
                                        <button onClick={() => handleCopy(hook)} className="p-3 text-slate-400 hover:text-slate-900 transition-colors">
                                            {copyStatus === hook ? <Icon name="check-check" className="text-green-500" /> : <Icon name="copy" />}
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'pillars' && (
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {strategyData.pillars.map((pillar) => (
                                    <div key={pillar.id} className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm hover:shadow-xl transition-all hover:-translate-y-1">
                                        <div className="text-5xl mb-6 bg-slate-50 w-20 h-20 flex items-center justify-center rounded-3xl">{pillar.icon}</div>
                                        <h3 className="text-xl font-black text-slate-900 mb-3 uppercase tracking-tight">{pillar.title}</h3>
                                        <p className="text-slate-500 font-medium leading-relaxed mb-6">{pillar.desc}</p>
                                        <button 
                                            onClick={() => setSelectedPillar(pillar)}
                                            className="flex items-center text-slate-900 font-black text-xs space-x-2 uppercase tracking-widest hover:translate-x-1 transition-transform group"
                                        >
                                            <Icon name="arrow-right" size={14} className="group-hover:text-blue-600" />
                                            <span className="group-hover:text-blue-600">Post Strategy</span>
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'captions' && (
                            <div className="grid md:grid-cols-2 gap-8">
                                {[
                                    { title: 'Hook & Short Format', content: strategyData.captions.short },
                                    { title: 'Storytelling / Deep Format', content: strategyData.captions.long }
                                ].map((cap, i) => (
                                    <div key={i} className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm">
                                        <h3 className="text-xl font-black mb-6 text-slate-400 uppercase tracking-widest">{cap.title}</h3>
                                        <div className="bg-slate-900 text-slate-200 p-8 rounded-3xl font-mono text-sm leading-relaxed mb-6 whitespace-pre-wrap h-64 overflow-y-auto">{cap.content}</div>
                                        <button onClick={() => handleCopy(cap.content)} className="w-full py-4 bg-slate-100 hover:bg-slate-200 text-slate-900 font-black rounded-2xl flex items-center justify-center space-x-2 transition-all">
                                            <Icon name="copy" size={18} /> <span>Salin Template</span>
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'growth' && (
                            <div className="max-w-2xl mx-auto space-y-6">
                                {strategyData.growth.map((step, i) => (
                                    <div key={i} className="flex space-x-6 group">
                                        <div className="w-14 h-14 bg-white border-4 border-slate-100 rounded-[1.5rem] flex items-center justify-center font-black text-xl shrink-0 group-hover:border-slate-900 transition-colors shadow-sm">
                                            {i + 1}
                                        </div>
                                        <div className="bg-white flex-1 p-8 rounded-[2rem] border border-slate-200 shadow-sm hover:shadow-md transition-all">
                                            <span className="bg-slate-900 text-white text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-widest">Hari {step.day}</span>
                                            <h4 className="text-2xl font-black mt-3 text-slate-900">{step.focus}</h4>
                                            <p className="text-slate-500 font-medium text-lg mt-2">{step.task}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Modal Details */}
                    {selectedPillar && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden">
                                <div className="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <div className="flex items-center space-x-4">
                                        <div className="text-3xl">{selectedPillar.icon}</div>
                                        <div>
                                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Strategi Eksekusi</p>
                                            <h3 className="text-xl font-black text-slate-900">{selectedPillar.title}</h3>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedPillar(null)} className="p-2 hover:bg-white rounded-full transition-colors border border-transparent hover:border-slate-200 shadow-sm">
                                        <Icon name="x" size={20} />
                                    </button>
                                </div>
                                <div className="p-10 space-y-6">
                                    <div className="bg-blue-50 p-6 rounded-3xl border border-blue-100 flex items-start space-x-4">
                                        <Icon name="lightbulb" className="text-blue-600 shrink-0 mt-1" size={24} />
                                        <p className="text-blue-900 font-medium italic leading-relaxed">"{selectedPillar.strategyDetails}"</p>
                                    </div>
                                    <button onClick={() => setSelectedPillar(null)} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-slate-200 hover:scale-[1.02] active:scale-95 transition-all">Tutup & Terapkan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Notification */}
                    {copyStatus && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl flex items-center space-x-3 z-[60] animate-fade-in border border-slate-700">
                            <Icon name="check-check" className="text-green-400" size={18} />
                            <span className="font-black text-sm uppercase tracking-widest">Tersalin ke Mastermind Lab</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
